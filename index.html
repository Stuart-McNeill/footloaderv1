<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Foot Analysis - Loader Edition</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0a0a0c;
            --panel-bg: rgba(25, 25, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: white; 
        }

        #ui-layer { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            pointer-events: none; 
            width: 280px;
        }

        .panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            pointer-events: auto; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h2 { 
            margin: 0 0 12px 0; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            color: #888; 
        }

        .group { display: flex; gap: 8px; margin-bottom: 12px; }

        button { 
            background: rgba(255, 255, 255, 0.05); 
            color: white; 
            border: 1px solid var(--border); 
            padding: 10px 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 11px; 
            font-weight: 500;
            transition: all 0.2s ease; 
            flex: 1;
        }

        button:hover { background: rgba(255, 255, 255, 0.1); }
        button.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .action-btn { background: white; color: black; font-weight: 600; margin-top: 5px; width: 100%; }
        
        #status { font-family: monospace; font-size: 10px; color: #555; margin-top: 10px; text-transform: uppercase; }
        #coords { font-weight: 500; color: var(--primary); margin-top: 4px; font-size: 14px; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="panel">
        <h2>Side Selection</h2>
        <div class="group">
            <button id="leftBtn" class="active">LEFT</button>
            <button id="rightBtn">RIGHT</button>
        </div>

        <h2>Tools</h2>
        <div class="group">
            <button id="rotateBtn" class="active">ROTATE</button>
            <button id="drawBtn">MARK</button>
        </div>
        
        <div class="group">
            <button id="undoBtn">UNDO</button>
            <button id="clearMarkersBtn">CLEAR</button>
        </div>

        <h2>Data Management</h2>
        <button id="downloadBtn" class="action-btn">SAVE REPORT</button>
        <button id="loadBtn" class="action-btn" style="background: #2ecc71;">LOAD REPORT</button>
        <input type="file" id="fileInput" accept=".txt">

        <div id="status">System Ready</div>
        <div id="coords">Region: None</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- DATA SOURCE ---
const PRESET_REGIONS = [
    { name: "Left foot - Dorsal Hallux Toenail", pos: [-0.111, 0.098, 0.465], rot: [0, 0, 0], scale: [0.05, 0.015, 0.05] },
    { name: "Left foot - Hallux Apex", pos: [-0.115, 0.069, 0.490], rot: [0, 0, 0], scale: [0.08, 0.05, 0.015] },
    { name: "Right foot - Dorsal Hallux Toenail", pos: [0.111, 0.098, 0.465], rot: [0, 0, 0], scale: [0.05, 0.015, 0.05] }
    // Note: Re-paste your full 100+ region list here
];

// --- APP STATE ---
let scene, camera, renderer, controls, model, currentFoot = 'left';
let isDrawing = false;
let markerLogs = [];
const markerGroup = new THREE.Group();
const hitboxGroup = new THREE.Group();
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

init();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0c);
    
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.5, 1.5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(1, 1, 1);
    scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

    controls = new OrbitControls(camera, renderer.domElement);
    scene.add(markerGroup);

    // Hitbox Setup
    scene.add(hitboxGroup);
    updateHitboxes();

    window.addEventListener('resize', onResize);
    renderer.domElement.addEventListener('pointerdown', handleClick);

    // UI Listeners
    document.getElementById('leftBtn').onclick = () => switchFoot('left');
    document.getElementById('rightBtn').onclick = () => switchFoot('right');
    document.getElementById('rotateBtn').onclick = () => toggleTool(false);
    document.getElementById('drawBtn').onclick = () => toggleTool(true);
    document.getElementById('undoBtn').onclick = undoLastMarker;
    document.getElementById('clearMarkersBtn').onclick = clearMarkers;
    document.getElementById('downloadBtn').onclick = downloadReport;
    
    // Loader Logic
    const fileInput = document.getElementById('fileInput');
    document.getElementById('loadBtn').onclick = () => fileInput.click();
    fileInput.onchange = handleFileLoad;

    animate();
}

function updateHitboxes() {
    hitboxGroup.clear();
    PRESET_REGIONS.forEach(region => {
        if (region.name.toLowerCase().includes(currentFoot)) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshBasicMaterial({ visible: false })
            );
            mesh.position.set(...region.pos);
            mesh.rotation.set(...region.rot);
            mesh.scale.set(...region.scale);
            mesh.userData = { regionName: region.name };
            hitboxGroup.add(mesh);
        }
    });
}

function switchFoot(side) {
    currentFoot = side;
    document.getElementById('leftBtn').classList.toggle('active', side === 'left');
    document.getElementById('rightBtn').classList.toggle('active', side === 'right');
    clearMarkers();
    updateHitboxes();
}

function toggleTool(drawing) {
    isDrawing = drawing;
    controls.enabled = !drawing;
    document.getElementById('drawBtn').classList.toggle('active', drawing);
    document.getElementById('rotateBtn').classList.toggle('active', !drawing);
}

function handleClick(e) {
    if (!isDrawing) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(hitboxGroup.children);

    if (intersects.length > 0) {
        const hit = intersects[0];
        addMarker(hit.object.position, hit.object.userData.regionName);
    }
}

function addMarker(pos, regionName) {
    const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.008),
        new THREE.MeshBasicMaterial({ color: 0x00f2ff })
    );
    dot.position.copy(pos);
    markerGroup.add(dot);
    
    markerLogs.push({ region: regionName, x: pos.x, y: pos.y, z: pos.z });
    document.getElementById("coords").textContent = regionName.split(' - ')[1];
}

function handleFileLoad(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
        const content = event.target.result;
        parseAndLoadMarkers(content);
    };
    reader.readAsText(file);
}

function parseAndLoadMarkers(text) {
    clearMarkers();
    const lines = text.split('\n');
    
    // Check if side matches current view
    const sideLine = lines.find(l => l.startsWith('Side:'));
    if (sideLine && !sideLine.toLowerCase().includes(currentFoot)) {
        const detectedSide = sideLine.toLowerCase().includes('left') ? 'left' : 'right';
        switchFoot(detectedSide);
    }

    lines.forEach(line => {
        // Regex to find: [Region Name] Coords: x, y, z
        const match = line.match(/\[(.*?)\] Coords: ([\d.-]+), ([\d.-]+), ([\d.-]+)/);
        if (match) {
            const name = match[1];
            const pos = new THREE.Vector3(parseFloat(match[2]), parseFloat(match[3]), parseFloat(match[4]));
            addMarker(pos, name);
        }
    });
}

function undoLastMarker() {
    if (markerGroup.children.length > 0) {
        markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
        markerLogs.pop();
    }
}

function clearMarkers() {
    markerGroup.clear();
    markerLogs = [];
    document.getElementById("coords").textContent = "Region: None";
}

function downloadReport() {
    if (markerLogs.length === 0) return alert("Nothing to save.");
    let txt = `FOOT ANALYSIS REPORT\nSide: ${currentFoot.toUpperCase()}\nDate: ${new Date().toLocaleString()}\n\n`;
    markerLogs.forEach((m, i) => {
        txt += `${i + 1}. [${m.region}] Coords: ${m.x}, ${m.y}, ${m.z}\n`;
    });
    const blob = new Blob([txt], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `Report_${currentFoot}_${Date.now()}.txt`;
    a.click();
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
</script>
</body>
</html>

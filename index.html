<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Foot Analysis - Muscle Visualization</title>
    <style>
        :root { --primary: #00f2ff; --bg: #0a0a0c; --panel-bg: rgba(25, 25, 30, 0.9); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: var(--bg); color: white; }
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; width: 300px; pointer-events: none; }
        .panel { background: var(--panel-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; border: 1px solid var(--border); pointer-events: auto; }
        .group { display: flex; gap: 8px; margin-bottom: 12px; }
        button { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; flex: 1; font-size: 12px; }
        button.active { background: var(--primary); color: black; font-weight: bold; }
        .action-btn { background: var(--primary); color: black; font-weight: bold; width: 100%; margin-top: 10px; }
        #coords-display { margin-top: 10px; font-family: monospace; font-size: 11px; color: var(--primary); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="panel">
        <h3 style="margin:0 0 10px 0; font-size: 14px;">3D FOOT SYSTEM</h3>
        
        <div class="group">
            <button id="leftBtn" class="active">LEFT FOOT</button>
            <button id="rightBtn">RIGHT FOOT</button>
        </div>

        <div class="group">
            <button id="rotateBtn" class="active">ROTATE</button>
            <button id="drawBtn">MARK</button>
        </div>

        <button id="loadMuscleBtn" class="action-btn">LOAD COORDINATES (.txt)</button>
        <input type="file" id="fileInput" accept=".txt">
        
        <div id="coords-display">Status: Ready</div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- CONFIG ---
const MODELS = {
    left: "https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb",
    right: "https://stuart-mcneill.github.io/feet-selection/RightFoot.glb"
};

let scene, camera, renderer, controls, currentModel;
let currentSide = 'left';
let isDrawing = false;
const muscleGroup = new THREE.Group();

init();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0c);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.4, 1);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    const direct = new THREE.DirectionalLight(0xffffff, 2);
    direct.position.set(1, 2, 1);
    scene.add(ambient, direct, muscleGroup);

    controls = new OrbitControls(camera, renderer.domElement);
    
    loadModel(MODELS.left);

    // UI Logic
    document.getElementById('leftBtn').onclick = () => { switchSide('left'); };
    document.getElementById('rightBtn').onclick = () => { switchSide('right'); };
    document.getElementById('rotateBtn').onclick = () => toggleTool(false);
    document.getElementById('drawBtn').onclick = () => toggleTool(true);
    
    const fileInput = document.getElementById('fileInput');
    document.getElementById('loadMuscleBtn').onclick = () => fileInput.click();
    fileInput.onchange = handleFileUpload;

    window.addEventListener('resize', onResize);
    animate();
}

function loadModel(url) {
    if (currentModel) scene.remove(currentModel);
    const loader = new GLTFLoader();
    loader.load(url, (gltf) => {
        currentModel = gltf.scene;
        scene.add(currentModel);
        document.getElementById('coords-display').innerText = "Model Loaded: " + currentSide;
    });
}

function switchSide(side) {
    currentSide = side;
    document.getElementById('leftBtn').classList.toggle('active', side === 'left');
    document.getElementById('rightBtn').classList.toggle('active', side === 'right');
    muscleGroup.clear();
    loadModel(MODELS[side]);
}

function toggleTool(drawing) {
    isDrawing = drawing;
    controls.enabled = !drawing;
    document.getElementById('drawBtn').classList.toggle('active', drawing);
    document.getElementById('rotateBtn').classList.toggle('active', !drawing);
}

function handleFileUpload(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (event) => {
        parseCoordinates(event.target.result);
    };
    reader.readAsText(file);
}

function parseCoordinates(text) {
    muscleGroup.clear();
    
    // Find all [x, y, z] patterns in the text
    const regex = /\[\s*([\d.-]+)\s*,\s*([\d.-]+)\s*,\s*([\d.-]+)\s*\]/g;
    let match;
    const points = [];

    while ((match = regex.exec(text)) !== null) {
        points.push(new THREE.Vector3(
            parseFloat(match[1]), 
            parseFloat(match[2]), 
            parseFloat(match[3])
        ));
    }

    if (points.length > 0) {
        visualizePath(points);
        document.getElementById('coords-display').innerText = `Loaded ${points.length} points`;
    } else {
        alert("No valid coordinates found in file. Ensure format is [x, y, z]");
    }
}

function visualizePath(points) {
    // 1. Create the Line (Tendon)
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({ color: 0x00f2ff, linewidth: 2 });
    const line = new THREE.Line(geometry, material);
    muscleGroup.add(line);

    // 2. Create small spheres for each point
    points.forEach(p => {
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.003),
            new THREE.MeshBasicMaterial({ color: 0xffffff })
        );
        sphere.position.copy(p);
        muscleGroup.add(sphere);
    });
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
</script>
</body>
</html>
